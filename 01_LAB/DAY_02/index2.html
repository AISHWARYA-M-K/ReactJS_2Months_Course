<body>
    <script>
            let arr = [34, 57, 987, 568, 245];
            let largest_no = arr[0];

            for(let i = 0; i = arr.length; i++){
                if(arr[i] > largest_no){
                    largest_no = arr[i];
                }
            }
            console.log(largest_no);
    </script>
